version: "1"
scenario_id: "stale-suppression-confidence-decay"
description: "A low-confidence stale record is evicted by the existing GC path before capsule build."
eval_dimensions:
  - "stale_memory_suppression"
requires_features:
  - "gc"
setup:
  records:
    - scope: "agent:eval-agent"
      type: "fact"
      title: "Legacy deploy memo"
      content: "The legacy deployment memo should not surface."
      confidence: 0.10
      created_at: "2025-01-01T00:00:00+00:00"
      updated_at: "2025-01-01T00:00:00+00:00"
sessions:
  - id: "query-session"
    turns:
      - user: "what legacy deployment memo do we still have?"
        assistant:
ground_truth:
  must_not_surface:
    - "legacy deployment memo"
