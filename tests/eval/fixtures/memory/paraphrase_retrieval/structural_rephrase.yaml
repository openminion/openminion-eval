version: "1"
scenario_id: "paraphrase-structural-rephrase"
description: "A structural rephrase still retrieves the stored rotation fact."
eval_dimensions:
  - "paraphrase_retrieval"
setup:
  records:
    - scope: "agent:eval-agent"
      type: "fact"
      title: "CI credential rotation"
      content: "The CI deploy key rotates every 90 days."
sessions:
  - id: "query-session"
    turns:
      - user: "how often does the CI auth key rotate?"
        assistant:
ground_truth:
