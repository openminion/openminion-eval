version: "1"
scenario_id: "typed-memory-ranking"
description: "Typed durable memory should surface corrections and preferences ahead of generic facts for response-style queries."
eval_dimensions:
  - "capsule_precision"
setup:
  records:
    - scope: "agent:eval-agent"
      type: "user_preference"
      title: "Preference: terse response style for reviews"
      content: "I prefer terse response style guidance for code reviews."
    - scope: "agent:eval-agent"
      type: "user_preference"
      title: "Preference: bullet lists for response style summaries"
      content: "I prefer response style summaries in bullet lists."
    - scope: "agent:eval-agent"
      type: "correction"
      title: "Correction: don't use exclamation points in response style guidance"
      content: "Don't use exclamation points in response style guidance."
    - scope: "agent:eval-agent"
      type: "project_convention"
      title: "Convention: pytest validation for response style review checks"
      content: "We use pytest validation during response style review checks."
    - scope: "agent:eval-agent"
      type: "project_convention"
      title: "Convention: include validation notes in response style PR summaries"
      content: "Our project includes validation notes in response style PR summaries."
    - scope: "agent:eval-agent"
      type: "fact"
      title: "Archive note about response style experiments from last summer retro number one with unrelated formatting history"
      content: "Historical response style archive note one with unrelated formatting history."
    - scope: "agent:eval-agent"
      type: "fact"
      title: "Archive note about response style experiments from last summer retro number two with unrelated formatting history"
      content: "Historical response style archive note two with unrelated formatting history."
    - scope: "agent:eval-agent"
      type: "fact"
      title: "Archive note about response style experiments from last summer retro number three with unrelated formatting history"
      content: "Historical response style archive note three with unrelated formatting history."
    - scope: "agent:eval-agent"
      type: "fact"
      title: "Archive note about response style experiments from last summer retro number four with unrelated formatting history"
      content: "Historical response style archive note four with unrelated formatting history."
    - scope: "agent:eval-agent"
      type: "fact"
      title: "Archive note about response style experiments from last summer retro number five with unrelated formatting history"
      content: "Historical response style archive note five with unrelated formatting history."
sessions:
  - id: "typed-ranking-session"
    turns:
      - user: "what response style guidance should I follow?"
        assistant:
