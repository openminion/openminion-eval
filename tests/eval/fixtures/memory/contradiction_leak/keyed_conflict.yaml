version: "1"
scenario_id: "contradiction-keyed-conflict"
description: "A keyed contradiction returns only the newer fact."
eval_dimensions:
  - "contradiction_leak"
setup:
  records:
    - scope: "agent:eval-agent"
      type: "fact"
      key: "deploy-key-rotation"
      title: "Old rotation policy"
      content: "The deploy key never rotates."
    - scope: "agent:eval-agent"
      type: "fact"
      key: "deploy-key-rotation"
      title: "Current rotation policy"
      content: "The deploy key rotates every 90 days."
sessions:
  - id: "query-session"
    turns:
      - user: "how often does the deploy key rotate?"
        assistant:
ground_truth:
  must_recall:
    - "every 90 days"
  must_not_surface:
    - "never rotates"
